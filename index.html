<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özür Dilerim ❤️</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #ffe6e6;
  margin-top: 30px;
  overflow: hidden;
}

button {
  padding: 15px 20px;
  font-size: 18px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#yesBtn { background: green; color: white; }
#noBtn { background: gray; color: white; position: relative; }

.fullscreen {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 70vw;
  max-height: 60vh;
  border-radius: 20px;
  transition: 0.6s;
}

/* yazı */
#finalText {
  position: fixed;
  top: 25%;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  font-size: 24px;
  color: #b30000;
  line-height: 1.6;
}

#loveBtn {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 20px;
  background: red;
  color: white;
  padding: 15px 25px;
  border-radius: 15px;
  display: none;
}

/* video yazı */
#videoText {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 22px;
  color: white;
  text-shadow: 2px 2px 5px black;
}
</style>

</head>

<body>

<h2>Beni affeder misin? 🥺</h2>

<button id="yesBtn">Evet ❤️</button> <button id="noBtn">Hayır 😢</button>

<p id="text"></p>

<!-- iPhone uyumlu autoplay -->

<audio id="music1" loop muted playsinline>
  <source src="muzik.mp3">
</audio>

<audio id="music2" loop>
  <source src="final.mp3">
</audio>

<script>
let yes = document.getElementById("yesBtn");
let no = document.getElementById("noBtn");
let text = document.getElementById("text");

let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

let count = 0;
let size = 18;

// SAYFA AÇILINCA MÜZİK (iphone trick)
window.onload = () => {
  music1.currentTime = 1;
  music1.play().then(() => {
    music1.muted = false;
  }).catch(()=>{});
};

no.onclick = () => {
  count++;
  text.innerText = "Ama lütfen düşün 🥺";

  size += 10;
  yes.style.fontSize = size + "px";

  no.style.position = "absolute";
  no.style.top = Math.random()*window.innerHeight+"px";
  no.style.left = Math.random()*window.innerWidth+"px";

  if(count >= 10){
    document.body.innerHTML = `<button id="bigYes" style="width:100vw;height:100vh;font-size:50px;background:green;color:white;border:none;">EVET ❤️</button>`;
    document.getElementById("bigYes").onclick = showLove;
  }
};

yes.onclick = showLove;

function showLove(){

  music1.pause();

  music2.currentTime = 91;
  music2.play().catch(()=>{});

  document.body.innerHTML = `
    <h2>Seni çok seviyorum ❤️</h2>
    <p id="finalText"></p>
    <button id="loveBtn">❤️ Affettim</button>
  `;

  let photos = [
    "foto1.jpg","foto2.jpg","foto3.jpg",
    "foto4.jpg","foto5.jpg","foto6.jpg",
    "foto7.jpg","foto8.jpg","foto9.jpg"
  ];

  photos.forEach((src, i) => {
    setTimeout(() => {
      let img = document.createElement("img");
      img.src = src;
      img.className = "fullscreen";
      document.body.appendChild(img);

      setTimeout(()=> img.style.transform="translate(-50%, -50%) scale(1)",50);
      setTimeout(()=> img.style.transform="translate(-50%, -50%) scale(0)",900);
      setTimeout(()=> img.remove(),1500);

    }, i * 1400);
  });

  setTimeout(showFinalText, photos.length * 1400);
}

function showFinalText(){

  let finalText = "Bebeğim benim biricik aşkım yaptığım şeyden dolayı özür dilerim, gerçekten istemeden yaptım bir daha böyle bir şey tekrarlanmayacak senden ricam gel barışalım sensizlik gözlerin kadar derin kuyularda mahsur kalmak gibi geliyor bana, sesini özledim gülüşünü özledim seni özledim aşkım gel bu özlemimize son verelim";

  let p = document.getElementById("finalText");

  let i = 0;
  let interval = setInterval(() => {
    p.innerHTML += finalText[i];
    i++;
    if(i >= finalText.length){
      clearInterval(interval);
      document.getElementById("loveBtn").style.display = "block";
    }
  }, 55);

  document.getElementById("loveBtn").onclick = () => {

    music2.pause();

    document.body.innerHTML = `
      <div style="position:relative;">
        <div id="videoText">manitayla barışınca gelen sevinç ❤️</div>

        <video autoplay controls playsinline style="
          width:100%;
          max-width:500px;
          border-radius:20px;
        ">
          <source src="video.mp4" type="video/mp4">
        </video>
      </div>
    `;
  };
}
</script>

</body>
</html>
