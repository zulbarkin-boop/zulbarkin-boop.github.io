<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özür Dilerim ❤️</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #ffe6e6;
  margin-top: 30px;
  overflow: hidden;
}

button {
  padding: 15px 20px;
  font-size: 18px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#yesBtn { background: green; color: white; }
#noBtn { background: gray; color: white; position: relative; }

.fullscreen {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 70vw;
  max-height: 60vh;
  border-radius: 20px;
  transition: 0.6s;
}

#finalText {
  position: fixed;
  top: 25%;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  font-size: 24px;
  color: #b30000;
  line-height: 1.6;
}

#loveBtn {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 20px;
  background: red;
  color: white;
  padding: 15px 25px;
  border-radius: 15px;
  display: none;
}

/* VIDEO YAZISI */
#videoText {
  position: absolute;
  top: 10px;
  width: 100%;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  color: black;
  background: pink;
  padding: 10px;
}
</style>

</head>

<body>

<h2>Beni affeder misin? 🥺</h2>

<button id="yesBtn">Evet ❤️</button> <button id="noBtn">Hayır 😢</button>

<p id="text"></p>

<audio id="music1" loop>
  <source src="muzik.mp3">
</audio>

<audio id="music2" loop>
  <source src="final.mp3">
</audio>

<script>
let yes = document.getElementById("yesBtn");
let no = document.getElementById("noBtn");
let text = document.getElementById("text");

let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

let count = 0;
let size = 18;

// 🔥 FARKLI MESAJLAR
let noMessages = [
  "Ama lütfen düşün 🥺",
  "Ama lüüttfeeen nolursun 😭",
  "Bir daha yapmam söz veriyorum 😔",
  "Kalbim kırılıyor 😢",
  "Beni böyle bırakma 😭",
  "Seni çok seviyorum ya 🥺",
  "Bir şans daha ver 😔",
  "Cidden çok üzgünüm 😞",
  "Ne olur affet beni 😭",
  "Son kez soruyorum 😢"
];

// ilk tıklamada müzik başlar
document.addEventListener("click", () => {
  music1.currentTime = 1;
  music1.play().catch(()=>{});
}, { once:true });

// HAYIR
no.onclick = () => {
  count++;

  text.innerText = noMessages[count-1] || "Artık evet de ❤️";

  size += 10;
  yes.style.fontSize = size + "px";

  no.style.position = "absolute";
  no.style.top = Math.random()*window.innerHeight+"px";
  no.style.left = Math.random()*window.innerWidth+"px";

  if(count >= 10){
    document.body.innerHTML = `<button id="bigYes" style="width:100vw;height:100vh;font-size:50px;background:green;color:white;border:none;">EVET ❤️</button>`;
    document.getElementById("bigYes").onclick = showLove;
  }
};

// 🔥 EVET BASILINCA (HER TÜRLÜ)
yes.onclick = showLove;

function showLove(){

  music1.pause();

  // 🔥 ARTIK HER EVETTE ÇALAR
  music2.currentTime = 91;
  music2.play().catch(()=>{});

  document.body.innerHTML = `
    <h2>Seni çok seviyorum ❤️</h2>
    <p id="finalText"></p>
    <button id="loveBtn">❤️ Affettim</button>
  `;

  let photos = [
    "foto1.jpg","foto2.jpg","foto3.jpg",
    "foto4.jpg","foto5.jpg","foto6.jpg",
    "foto7.jpg","foto8.jpg","foto9.jpg"
  ];

  photos.forEach((src, i) => {
    setTimeout(() => {
      let img = document.createElement("img");
      img.src = src;
      img.className = "fullscreen";
      document.body.appendChild(img);

      setTimeout(()=> img.style.transform="translate(-50%, -50%) scale(1)",50);
      setTimeout(()=> img.style.transform="translate(-50%, -50%) scale(0)",900);
      setTimeout(()=> img.remove(),1500);

    }, i * 1400);
  });

  setTimeout(showFinalText, photos.length * 1400);
}

// YAZI
function showFinalText(){

  let finalText = "Bebeğim benim biricik aşkım yaptığım şeyden dolayı özür dilerim...";

  let p = document.getElementById("finalText");

  let i = 0;
  let interval = setInterval(() => {
    p.innerHTML += finalText[i];
    i++;
    if(i >= finalText.length){
      clearInterval(interval);
      document.getElementById("loveBtn").style.display = "block";
    }
  }, 55);

  // VIDEO
  document.getElementById("loveBtn").onclick = () => {

    music2.pause();

    document.body.innerHTML = `
      <div style="position:relative;">
        <div id="videoText">manitayla barışınca gelen sevinç</div>

        <video autoplay controls playsinline style="
          width:100%;
          max-width:500px;
          border-radius:20px;
        ">
          <source src="video.mp4" type="video/mp4">
        </video>
      </div>
    `;
  };
}
</script>

</body>
</html>
