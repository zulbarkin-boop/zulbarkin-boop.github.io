<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özür Dilerim ❤️</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #ffe6e6;
}

button {
  padding: 15px;
  font-size: 18px;
  margin: 10px;
  border-radius: 10px;
  border: none;
}

#yesBtn { background: green; color: white; }
#noBtn { background: gray; color: white; }

#videoText {
  position: absolute;
  top: 10px;
  width: 100%;
  text-align: center;
  font-weight: bold;
  color: black;
  background: pink;
  padding: 10px;
}
</style>

</head>

<body>

<h2>Beni affeder misin? 🥺</h2>

<button id="yesBtn">Evet ❤️</button> <button id="noBtn">Hayır 😢</button>

<p id="text"></p>

<!-- 🔥 ÖNEMLİ: loop YOK -->

<audio id="music1" src="muzik.mp3"></audio>

<!-- 🔥 loop olabilir -->

<audio id="music2" loop src="final.mp3"></audio>

<script>
let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

let started = false;

// 🔥 İLK TIK → MÜZİK1 BAŞLAT
document.addEventListener("click", () => {

  if(!started){
    started = true;

    music1.currentTime = 1;

    let p = music1.play();
    if(p !== undefined){
      p.catch(()=>{});
    }
  }

}, { once:true });


// 🔥 MÜZİK1 BİTİNCE → MÜZİK2 (01:31)
music1.onended = function(){

  setTimeout(() => {

    music2.currentTime = 91;

    let p = music2.play();
    if(p !== undefined){
      p.catch(()=>{});
    }

  }, 300);

};
</script>

</body>
</html>
