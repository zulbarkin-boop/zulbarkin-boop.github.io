<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özür Dilerim ❤️</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #ffe6e6;
  overflow: hidden;
}

button {
  padding: 15px 20px;
  font-size: 18px;
  margin: 10px;
  border: none;
  border-radius: 10px;
}

#yesBtn { background: green; color: white; }
#noBtn { background: gray; color: white; position: relative; }

.fullscreen {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 70vw;
  max-height: 60vh;
  border-radius: 20px;
  transition: 0.5s;
}

#textArea {
  margin-top: 20px;
  font-size: 18px;
}

#finalText {
  width: 85%;
  margin: auto;
  font-size: 24px;
  color: #b30000;
  margin-top: 40px;
  line-height: 1.6;
}

#videoText {
  position: absolute;
  top: 10px;
  width: 100%;
  text-align: center;
  font-weight: bold;
  color: black;
  background: pink;
  padding: 10px;
}
</style>

</head>

<body>

<h2>Beni affeder misin? 🥺</h2>

<button id="yesBtn">Evet ❤️</button> <button id="noBtn">Hayır 😢</button>

<p id="textArea"></p>

<audio id="music1" loop src="muzik.mp3"></audio> <audio id="music2" loop src="final.mp3"></audio>

<script>
let yes = document.getElementById("yesBtn");
let no = document.getElementById("noBtn");
let text = document.getElementById("textArea");

let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

let count = 0;
let size = 18;
let firstClick = false;

// ❌ hayır mesajları
let messages = [
  "Lüütfeeen nolursun 😭",
  "Bir daha yapmam 😔",
  "Kalbim kırılıyor 😢",
  "Seni çok seviyorum 🥺",
  "Beni bırakma 😭",
  "Cidden üzgünüm 😞",
  "Affet beni 😭",
  "Ne olur 😢",
  "Son şansım 😭",
  "Artık evet de ❤️"
];

// 🔥 ilk tıklamada müzik başlat (iphone fix)
document.addEventListener("click", () => {
  if(!firstClick){
    firstClick = true;
    music1.currentTime = 1;
    music1.play().catch(()=>{});
  }
});

// ❌ hayır
no.onclick = () => {
  text.innerText = messages[count] || "Artık evet de ❤️";
  count++;

  size += 8;
  yes.style.fontSize = size + "px";

  no.style.position = "absolute";
  no.style.top = Math.random()*window.innerHeight+"px";
  no.style.left = Math.random()*window.innerWidth+"px";

  if(count >= 10){
    document.body.innerHTML = `
      <button id="bigYes" style="
        width:100vw;
        height:100vh;
        font-size:50px;
        background:green;
        color:white;
        border:none;
      ">EVET ❤️</button>
    `;

    document.getElementById("bigYes").onclick = startLove;
  }
};

// ✅ evet
yes.onclick = startLove;

function startLove(){

  // müzik değiştir
  music1.pause();
  music2.currentTime = 91;
  music2.play().catch(()=>{});

  document.body.innerHTML = `
    <h2>Seni çok seviyorum ❤️</h2>
    <p id="finalText"></p>
    <button id="loveBtn" style="display:none;">❤️ Affettim</button>
  `;

  let photos = [
    "foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg",
    "foto6.jpg","foto7.jpg","foto8.jpg","foto9.jpg","foto10.jpg"
  ];

  // 📸 foto sahnesi
  photos.forEach((src, i) => {
    setTimeout(() => {
      let img = document.createElement("img");
      img.src = src;
      img.className = "fullscreen";
      document.body.appendChild(img);

      setTimeout(()=> img.style.transform="translate(-50%, -50%) scale(1)",50);
      setTimeout(()=> img.style.transform="translate(-50%, -50%) scale(0)",900);
      setTimeout(()=> img.remove(),1500);

    }, i * 1200);
  });

  setTimeout(showText, photos.length * 1200);
}

// ✍️ yazı animasyonu
function showText(){

  let finalText = "Bebeğim benim biricik aşkım yaptığım şeyden dolayı özür dilerim, gerçekten istemeden yaptım bir daha böyle bir şey tekrarlanmayacak senden ricam gel barışalım sensizlik gözlerin kadar derin kuyularda mahsur kalmak gibi geliyor bana, sesini özledim gülüşünü özledim seni özledim aşkım gel bu özlemimize son verelim";

  let p = document.getElementById("finalText");

  let i = 0;
  let interval = setInterval(() => {
    p.innerHTML += finalText[i];
    i++;
    if(i >= finalText.length){
      clearInterval(interval);
      document.getElementById("loveBtn").style.display = "block";
    }
  }, 50);

  // ❤️ affettim
  document.getElementById("loveBtn").onclick = () => {

    music2.pause();

    document.body.innerHTML = `
      <div style="position:relative;">
        <div id="videoText">manitayla barışınca gelen sevinç</div>

        <video autoplay controls playsinline style="
          width:100%;
          max-width:500px;
          border-radius:20px;
        ">
          <source src="video.mp4">
        </video>
      </div>
    `;
  };
}
</script>

</body>
</html>
