<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özür Dilerim ❤️</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #ffe6e6;
}

button {
  padding: 15px;
  font-size: 18px;
  margin: 10px;
  border-radius: 10px;
  border: none;
}

#yesBtn { background: green; color: white; }
#noBtn { background: gray; color: white; position: relative; }

#videoText {
  position: absolute;
  top: 10px;
  width: 100%;
  text-align: center;
  font-weight: bold;
  color: black;
  background: pink;
  padding: 10px;
}
</style>

</head>

<body>

<h2>Beni affeder misin? 🥺</h2>

<button id="yesBtn">Evet ❤️</button> <button id="noBtn">Hayır 😢</button>

<p id="text"></p>

<audio id="music1" loop src="muzik.mp3"></audio> <audio id="music2" loop src="final.mp3"></audio>

<script>
let music1 = document.getElementById("music1");
let music2 = document.getElementById("music2");

let yes = document.getElementById("yesBtn");
let no = document.getElementById("noBtn");
let text = document.getElementById("text");

let count = 0;

// 🔥 farklı mesajlar
let messages = [
  "Ama lütfen düşün 🥺",
  "Ama lüüttfeeen nolursun 😭",
  "Kalbim kırılıyor 😢",
  "Bir daha yapmam 😔",
  "Seni çok seviyorum 🥺",
  "Beni bırakma 😭",
  "Cidden üzgünüm 😞",
  "Affet beni 😭",
  "Son kez soruyorum 😢",
  "Artık evet de ❤️"
];

// 🔥 İLK TIK → MÜZİK BAŞLAT (GARANTİ)
document.addEventListener("click", () => {
  music1.currentTime = 1;
  music1.play().catch(()=>{});
}, { once:true });

// ❌ HAYIR
no.onclick = () => {
  count++;
  text.innerText = messages[count] || "Artık evet de ❤️";

  no.style.position = "absolute";
  no.style.top = Math.random()*window.innerHeight+"px";
  no.style.left = Math.random()*window.innerWidth+"px";
};

// ✅ EVET (HER ZAMAN ÇALIŞIR)
yes.onclick = startLove;

function startLove(){

  // 🔥 MÜZİK GEÇİŞİ (EN KRİTİK FIX)
  music1.pause();
  music2.currentTime = 91;

  let p = music2.play();
  if(p !== undefined){
    p.catch(()=>{});
  }

  // 🎬 SAHNE
  document.body.innerHTML = `
    <h2>Seni çok seviyorum ❤️</h2>
    <button onclick="showVideo()">❤️ Affettim</button>
  `;
}

// 🎥 VIDEO
function showVideo(){

  music2.pause();

  document.body.innerHTML = `
    <div style="position:relative;">
      <div id="videoText">manitayla barışınca gelen sevinç</div>

      <video autoplay controls playsinline style="width:100%;max-width:500px;">
        <source src="video.mp4">
      </video>
    </div>
  `;
}
</script>

</body>
</html>
